#
# Only supports single Retimer FW section as of now
#
[Retimer0]
FirmwareType  = 1   ; DO NOT MODIFY (1: Discrete TBT Retimer)
BusNumber     = 255 ; DO NOT MODIFY (Discrete TBT Retimer unsupported)
DevNumber     = 255 ; DO NOT MODIFY (Discrete TBT Retimer unsupported)
FunNumber     = 255 ; DO NOT MODIFY (Discrete TBT Retimer unsupported)
PortNumber    = 0   ; 0: TBT PortA, 1: TBT PortB
CascadedRetimerIndex  = 1 ; 1-based (1: for single retimer or cascaded retimer facing SoC. 2: cascaded retimer facing connector)

# When FirmwareType is "Discrete TBT retimer" that support PcieRpType and PcieRpNumber.
PcieRpType    = 2  ; DO NOT MODIFY (2:PCH, 4:CPU)

# When PcieRpType is "PCH", PcieRpNumber as defined by "PCI Express* Port Configuration" chapter in EDS spec.
PcieRpNumber  = 9

# Indicates the filename of Retimer FW image. (under the same directory as this ini file)
FileName      = Discrete_Thunderbolt_Retimer_Deivce_Firmware.bin