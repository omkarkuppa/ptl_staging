#
# Support multiple Retimer FW sections
#
[Retimer0]
FirmwareType  = 0   ; DO NOT MODIFY (0: Integrated TBT Retimer)
BusNumber     = 0   ; DO NOT MODIFY for Integrated TBT Retimer.
DevNumber     = 13  ; DO NOT MODIFY for Integrated TBT Retimer.
FunNumber     = 2   ; 2 or 3. 2: For HBR_xxx_PORTS_0_1_xxx.bin, 3: For HBR_xxx_PORTS_2_3_xxx.bin
PortNumber    = 0   ; 0: TBT PortA, 1: TBT PortB
CascadedRetimerIndex  = 1 ; 1-based (1: for single retimer or cascaded retimer facing SoC. 2: cascaded retimer facing connector)
PcieRpType    = 255 ; DO NOT MODIFY (Unsupported on Integrated TBT Retimer)
PcieRpNumber  = 255 ; DO NOT MODIFY (Unsupported on Integrated TBT Retimer)
# Indicates the filename of Retimer FW image. (under the same directory as this ini file)
FileName      = Integrated_Thunderbolt_Retimer_Deivce_Firmware.bin