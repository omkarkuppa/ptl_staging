#
# Only supports single Thunderbolt FW section as of now
#
[Thunderbolt0]
FirmwareType  = 2  ; DO NOT MODIFY (2: Discrete TBT)

# When FirmwareType is "Discrete TBT" that support PcieRpType and PcieRpNumber.
PcieRpType    = 4  ; (2:PCH, 4:CPU)

# When PcieRpType is "PCH", PcieRpNumber as defined by "PCI Express* Port Configuration" chapter in EDS spec.
PcieRpNumber  = 5

# Indicates the filename of TBT FW image. (under the same directory as this ini file)
FileName      = Discrete_Thunderbolt_Device_Firmware.bin