#
# Support multiple PD Bridge FW sections
#
[PdBridge0]
FirmwareType  = 3  ; DO NOT MODIFY (3: PD Bridge)

# When FirmwareType is "PD Bridge" that support PdCntrlIndex and ShareFlashMode.
PdCntrlIndex    = 0  ; The index number of PD controller and starts with index 0.

# Determined the PD image flashed with ShareFlashMode or not
ShareFlashMode  = 0 ; 0: Disabled, 1:Enabled

# Indicates the filename of PD Bridge FW image. (under the same directory as this ini file)
FileName      = PD_Bridge_Device_Firmware.bin