#
# uCode Firmware sub-section
#
[[Firmware.Ucode]]
  Version        = 1
  IsEnabled      = false
  BuildCmd       = 'ucodecap'
  CapFilePrefix  = 'FmpuCode'
  CapFilePostfix = ''

  #
  # Template file should be relative path to Template folder.
  #
  BgslTemplateFile = 'BiosUpdateScript.bgsl.template'

  [Firmware.Ucode.Command]
    Title          = 'Build uCode capsule update file'
    Description    = '''
To build the Ucode Capsule File.
  (1) Use -sku to assign which platform need to be built.
      (This flag is align with slot size)
  (2) Use -ucode multiple times to assign all needed uCode.
      e.g. -ucode <uCode1> -ucode <uCode2> ...
    '''
    SubDescription = '''
Note:
  (1) Numbers of available uCode depend on slot size and FV size.
    '''

  [Firmware.Ucode.Command.-sku]
    Compulsory  = false
    Description = 'Decide to build the Ucode slot size and FV size.'
    Syntax      = 'SKU_ID'
    Default     = 'Default'

  [Firmware.Ucode.Command.-ucode]
    Compulsory  = true
    Description = 'Path of Ucode image. (Should be .pdt file)'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Ucode.Command.-ucodemode]
    Compulsory  = true
    Description = 'Current support ucodefull, ucodebgup, ucodeslot.'
    Syntax      = 'ucodefull|ucodebgup|ucodeslot'
    Default     = ''

  [Firmware.Ucode.Command.-ucodever]
    Compulsory  = false
    Description = 'Version of uCode could input DEC or HEX. (HEX should be with 0x prefix)'
    Syntax      = 'DEC|HEX'
    Default     = '1'

  [Firmware.Ucode.Command.-ucodelsv]
    Compulsory  = false
    Description = 'Lowest supported version of uCode could input DEC or HEX. (HEX should be with 0x prefix)'
    Syntax      = 'DEC|HEX'
    Default     = '1'

  [Firmware.Ucode.Command.-ucodeverstr]
    Compulsory  = false
    Description = 'String of uCode be built in Ucode header.'
    Syntax      = 'STR'
    Default     = 'Version 0.0.0.1'

  [Firmware.Ucode.Command.-build]
    Compulsory  = false
    Description = 'Assign using debug or release BIOS. (uCodeslot mode no need)'
    Syntax      = 'Debug|Release'
    Default     = ''

  [Firmware.Ucode.Command.-biossvn]
    Compulsory  = false
    Description = 'BiosGuard SVN value. (ucodebgup mode is mandatory)'
    Syntax      = 'HEX'
    Default     = 'NA'

  [Firmware.Ucode.Command.res]
    Compulsory  = false
    Description = 'Set the flag as input the resiliency BIOS.'
    Syntax      = ''
    Default     = false

  #
  # The actual offset and size should be depend on the platform.
  # Tag order: [Type].[Build].[SKU]
  # e.g. { Offset = '0x00C80000', Size = '0x00040000' }
  #
  [Firmware.Ucode.Offset.Default]
    Fv = 'NA'

  [Firmware.Ucode.SlotSize]
    # The default slot size value should be depended by platforms.
    # (e.g. '0x3F000')
    Default = 'NA'

  [Firmware.Ucode.Guid]
    Default = '69585D92-B50A-4AD7-B265-2EB1AE066574'

