  [Firmware.Ifwi.Command]
    Title          = 'Build IFWI capsule update file'
    Description    = '''
To build the IFWI Capsule File.
  (1) User assign the IFWI image by command '-ifwi' directly.
  (2) Capsule LSV and ESRT information are not supported.
    '''
    SubDescription = '''
Caution:
  (1) IFWI capsule is supported on development stage only and not supported after End-of-Manufactory (EOM).
  (2) It should not be used on product.
    '''

  [Firmware.Ifwi.Command.-ifwi]
    Compulsory  = true
    Description = 'Path of the IFWI image.'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Ifwi.Command.-biossvn]
    Compulsory  = false
    Description = 'BiosGuard SVN default would be the same as BIOS version.'
    Syntax      = 'HEX'
    Default     = 'NA'

  [Firmware.Ifwi.Guid]
    Default = 'F9FA5980-95F5-491A-9583-136D7F26D63E'

#
# BtGAcm Firmware sub-section
#
[[Firmware.Btgacm]]
  Version        = 1
  IsEnabled      = false
  BuildCmd       = 'btgacmcap'
  CapFilePrefix  = 'FmpBtGAcm'
  CapFilePostfix = ''

  #
  # Template file should be relative path to Template folder.
  #
  BgslTemplateFile = 'BiosUpdateScript.bgsl.template'

  [Firmware.Btgacm.Command]
    Title          = 'Build BtGAcm capsule update file'
    Description    = '''
To build the BtGAcm Capsule File.
  (1) Use -build to decide the target of BIOS is debug or release.
  (2) Use -res to decide the type of BIOS is resiliency BIOS or not.
    '''
    SubDescription = '''
    '''

  [Firmware.Btgacm.Command.-btgacm]
    Compulsory  = true
    Description = 'Path of BtGAcm image.'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Btgacm.Command.-btgacmlsv]
    Compulsory  = false
    Description = 'Lowest supported version of BtGAcm. (Should be MM.mm.BB)'
    Syntax      = 'DEC|HEX'
    Default     = '0.0.0'

  [Firmware.Btgacm.Command.-build]
    Compulsory  = true
    Description = 'Assign using debug or release BIOS.'
    Syntax      = 'Debug|Release'
    Default     = ''

  [Firmware.Btgacm.Command.-biossvn]
    Compulsory  = true
    Description = 'BiosGuard SVN value.'
    Syntax      = 'HEX'
    Default     = 'NA'

  [Firmware.Btgacm.Command.res]
    Compulsory  = false
    Description = 'Set the flag as input the resiliency BIOS.'
    Syntax      = ''
    Default     = false

  [Firmware.Btgacm.Command.--single]
    Compulsory  = false
    Description = 'Build for the primary slot of BtGAcm only.'
    Syntax      = ''
    Default     = false

  #
  # The actual offset and size should be depend on the platform.
  # Tag order: [Type].[Build].[SKU]
  # e.g. { Offset = '0x00C80000', Size = '0x00040000' }
  #
  [Firmware.Btgacm.Offset.Default]
    Fv = 'NA'

  [Firmware.Btgacm.SlotSize]
    # The default slot size value should be depended by platforms.
    # (e.g. '0x40000')
    Default = 'NA'

  [Firmware.Btgacm.Guid]
    Default = '4E88068B-41B2-4E05-893C-DB0B43F7D348'

