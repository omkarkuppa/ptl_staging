Title = "Configuration file - TOML for Client CapsuleGenerate"

[Common]
  Vendor             = 'Intel'
  PlatformGeneration = 999
  PlatformFullName   = 'Client'
  PlatformPrefix     = 'Client'
  HashAlgorithm      = 'sha384'

[Keystore]
  CapTrustPublicCert   = 'SigningKeys/TestRoot3K.pub.pem'
  CapOtherPublicCert   = 'SigningKeys/TestSub3K.pub.pem'
  CapSignerPrivateCert = 'SigningKeys/TestCert3K.pem'
  WinDriverPfxCert     = 'SigningKeys/SAMPLE_DEVELOPMENT.pfx'
  MePreProdCertSubject = ''
  MeProdCertSubject    = ''

[Path]
  ToolDir           = 'Tools'
  TemplateDir       = 'Template'
  EdkIIBaseToolsDir = 'Tools/BaseTools'
  OpenSSLDir        = 'Tools/OpenSSL'
  EdssSignFileDir   = 'Tools/SignFile'

  [Path.PyScript]
    CleanUpScript         = 'Scripts/CleanUp.py'
    XdrBuilderScript      = 'Scripts/XdrBuilder.py'
    EdkiiFdBuilderScript  = 'Scripts/Edk2/Edk2FdBuilder.py'
    WinInfGeneratorScript = 'Scripts/Capsule/WinDriverInfGenerator.py'
    WinCatGeneratorScript = 'Scripts/Capsule/WinDriverCatGenerator.py'
    WinCatSignerScript    = 'Scripts/Capsule/WinDriverCatSigner.py'

[FitTool]
  Method                    = 'mFit'
  LayoutPlatform            = ''
  IfwiDecomposerScript      = 'Scripts/Intel/Ifwi/IfwiDecomposer.py'
  IfwiXmlConfigParserScript = 'Scripts/Intel/Ifwi/IfwiXmlConfigParser.py'
  IfwiFWUpdateBuilderScript = 'Scripts/Intel/Ifwi/IfwiFWUpdateBuilder.py'

[BiosGuard]
  PlatformId          = 'Client'
  BgupGeneratorScript = 'Scripts/Intel/BiosGuard/SignedBgupGenerator.py'
  [BiosGuard.Program]
    Bgpb     = 'Tools/BiosGuard/UpdatePackage/BiosGuardPB.exe'
    Bgsl2Bin = 'Tools/BiosGuard/UpdatePackage/BiosGuardSL2BIN.exe'
  [BiosGuard.Certificate]
    #
    # The valid SignType should be one of the following.
    # 'Self', 'OpenSSL'
    #
    SignType  = 'OpenSSL'
    #
    # The valid Algorithm should be one of the following.
    # 'RSA2048_SHA256_1_5', 'RSA2048_SHA256_v_2_1',
    # 'RSA3072_SHA256_1_5', 'RSA3072_SHA256_v_2_1',
    # 'RSA3072_SHA384_1_5', 'RSA3072_SHA384_v_2_1',
    #
    Algorithm = ''
    SignTool  = 'Tools/OpenSSL/openssl.exe'
    PbkFile   = ''
    PvkFile   = ''

[Device]
  [Device.Spi]
    [Device.Spi.TopSwapSize]
      # 4MB
      Default = '0x00400000'
    [Device.Spi.FlashBlockSize]
      # 64KB
      Default = '0x00010000'

