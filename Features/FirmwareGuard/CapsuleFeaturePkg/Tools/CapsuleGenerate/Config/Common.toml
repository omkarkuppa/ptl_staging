[Firmware]
#
# BIOS Firmware sub-section
#
[[Firmware.Bios]]
  Version        = 1
  IsEnabled      = false
  BuildCmd       = 'bioscap'
  CapFilePrefix  = 'FmpBios'
  CapFilePostfix = ''

  #
  # Template file should be relative path to Template folder.
  #
  BgslTemplateFile = 'BiosUpdateScript.bgsl.template'

  #
  # The format of BIOS Version (in DEC): MMMMmm
  # M: major version, m: minor version. e.g., 2413.01 -> 241301
  #
  [Firmware.Bios.Command]
    Title          = 'Build BIOS capsule update file'
    Description    = '''
To build the BIOS Capsule File.
Support two methods
  (1) Use -fit and -ifwi to decompose the BIOS firmware.
  (2) Use -bios to assign the BIOS firmware.
    '''
    SubDescription = '''
Note:
  (1) -bios have the high priority to override the BIOS firmware that decompose from IFWI.
    '''

  [Firmware.Bios.Command.-fit]
    Compulsory  = false
    Description = 'Path of the FIT tool. (Should use with "-ifwi")'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Bios.Command.-ifwi]
    Compulsory  = false
    Description = 'Path of the IFWI image. (Should use with "-fit")'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Bios.Command.-bios]
    Compulsory  = false
    Description = 'Path of BIOS image.'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Bios.Command.-biossvn]
    Compulsory  = false
    Description = 'BiosGuard SVN default would be the same as BIOS version.'
    Syntax      = 'HEX'
    Default     = 'NA'

  [Firmware.Bios.Command.-bioslsv]
    Compulsory  = false
    Description = 'Lowest supported version on BIOS firmware.'
    Syntax      = 'INT'
    Default     = '0'

  [Firmware.Bios.Command.res]
    Compulsory  = false
    Description = 'Set the flag as input the resiliency BIOS.'
    Syntax      = ''
    Default     = false

  #
  # The actual offset and size should be depend on the platform.
  # Tag order: [Type].[Build].[SKU]
  # e.g. { Offset = "0x00C80000", Size = "0x00040000" }
  #
  [Firmware.Bios.Offset.Default]
    Obb1 = 'NA'
    Obb  = 'NA'
    Ibbr = 'NA'
    Ibb  = 'NA'

  [Firmware.Bios.Guid]
    Default = '6C8E136F-D3E6-4131-AC32-4687CB4ABD27'

