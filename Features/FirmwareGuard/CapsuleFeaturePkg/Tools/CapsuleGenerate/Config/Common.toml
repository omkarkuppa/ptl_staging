#
# Monolithic Firmware sub-section
#
[[Firmware.Monolithic]]
  Version        = 1
  IsEnabled      = false
  BuildCmd       = 'monocap'
  CapFilePrefix  = 'FmpMonolithic'
  CapFilePostfix = ''

  [Firmware.Monolithic.Command]
    Title          = 'Build Monolithic capsule update file'
    Description    = '''
To build the Monolithic Capsule File.
Support two methods
  (1) Use -fit and -ifwi to decompose the each firmware component.
      Could use each firmware flag to override the decomposed component.
        -bios: BIOS image file. (If decompose from IFWI, then optional)
        -me  : ME image file.   (Optional)
        -ec  : EC image file.   (Optional)
        -pdt : Pdt image file.  (Optional)
        -gbe : GbE image file.  (Optional)
  (2) Use each firmware flag to input separately others would use dummy file to replace.
    '''
    SubDescription = '''
Note:
  (1) At least need input the BIOS image or capsule build would get failed.
    '''

  [Firmware.Monolithic.Command.-fit]
    Compulsory  = false
    Description = 'Path of the FIT tool. (Should use with "-ifwi")'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Monolithic.Command.-ifwi]
    Compulsory  = false
    Description = 'Path of the IFWI image. (Should use with "-fit")'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Monolithic.Command.-bios]
    Compulsory  = false
    Description = 'Path of BIOS image.'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Monolithic.Command.-me]
    Compulsory  = false
    Description = 'Path of ME image. (Input "IGNORE" as dummy)'
    Syntax      = 'PATH|IGNORE'
    Default     = ''

  [Firmware.Monolithic.Command.-ec]
    Compulsory  = false
    Description = 'Path of EC image. (Input "IGNORE" as dummy)'
    Syntax      = 'PATH|IGNORE'
    Default     = ''

  [Firmware.Monolithic.Command.-pdt]
    Compulsory  = false
    Description = 'Path of IshPdt image. (Input "IGNORE" as dummy)'
    Syntax      = 'PATH|IGNORE'
    Default     = ''

  [Firmware.Monolithic.Command.-gbe]
    Compulsory  = false
    Description = 'Path of GbE image. (Input "IGNORE" as dummy)'
    Syntax      = 'PATH|IGNORE'
    Default     = ''

  [Firmware.Monolithic.Command.-biossvn]
    Compulsory  = false
    Description = 'BiosGuard SVN default would be the same as BIOS version.'
    Syntax      = 'HEX'
    Default     = 'NA'

  [Firmware.Monolithic.Command.-bioslsv]
    Compulsory  = false
    Description = 'Lowest supported version on BIOS firmware.'
    Syntax      = 'INT'
    Default     = '0'

  [Firmware.Monolithic.Command.-cse]
    Compulsory  = false
    Description = 'Path of CSE image. (Should use when input Corporate IFWI)'
    Syntax      = 'PATH'
    Default     = ''

  [Firmware.Monolithic.Command.res]
    Compulsory  = false
    Description = 'Set the flag as input the resiliency BIOS.'
    Syntax      = ''
    Default     = false

  [Firmware.Monolithic.Command.cseregion]
    Compulsory  = false
    Description = 'To get the full CSE region not FWU image. (Should use when decompose from IFWI)'
